<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Conversor de Monedas Nacional</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <div class="container">
    <h1>Conversor de Monedas Nacional</h1>

    <label for="monto">Ingrese el monto en CLP:</label>
    <input type="number" id="monto" placeholder="00000">

    <label for="moneda">Moneda a convertir:</label>
    <select id="moneda">
      <option value="dolar">Dólar</option>
      <option value="euro">Euro</option>
      <option value="uf">UF</option>
      <option value="bitcoin">Bitcoin</option>
    </select>

    <button id="buscar">Buscar</button>

    <p id="resultado"></p>

    <canvas id="grafico"></canvas>
  </div>

  <script src="app.js"></script>
</body>
</html>
